[module/alsa]
type = internal/alsa

master-soundcard = default
speaker-soundcard = default
headphone-soundcard = default

master-mixer = Master

interval = 5

format-volume = <ramp-volume> <label-volume>
format-volume-background = ${color.background-alt}
format-volume-padding = 1

format-muted = <label-muted>
format-muted-prefix = 
format-muted-prefix-foreground = ${color.red}
format-muted-background = ${color.background-alt}
format-muted-padding = 1

label-volume = %percentage%%

label-muted = " Muted"
label-muted-foreground = ${color.foreground}

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-0-foreground = ${color.red}
ramp-volume-1-foreground = ${color.amber}
ramp-volume-2-foreground = ${color.green}

ramp-headphones-0 = 

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/backlight]
type = internal/backlight

card = amdgpu_bl0

format = <ramp> <label>
format-background = ${color.background-alt}
format-padding = 1

label = %percentage%%

ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-3 = 
ramp-4 = 
ramp-0-foreground = ${color.gray}
ramp-1-foreground = ${color.gray}
ramp-2-foreground = ${color.yellow}
ramp-3-foreground = ${color.orange}
ramp-4-foreground = ${color.orange}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/battery]
type = internal/battery

full-at = 99

battery = BAT1
adapter = ACAD

poll-interval = 2

time-format = %H:%M

format-charging = <label-charging>
format-charging-prefix = " "
format-charging-prefix-foreground = ${color.green}
format-charging-background = ${color.background-alt}
format-charging-padding = 1

format-discharging = <label-discharging>
format-discharging-prefix = " "
format-discharging-prefix-foreground = ${color.amber}
format-discharging-background = ${color.background-alt}
format-discharging-padding = 1

format-full = <label-full>
format-full-prefix = " "
format-full-prefix-foreground = ${color.green}
format-full-background = ${color.background-alt}
format-full-padding = 1

label-charging = %percentage%%
label-charging-foreground = ${color.green}

label-discharging = %percentage%%
label-discharging-foreground = ${color.amber}

label-full = Full
label-full-foreground = ${color.green}

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/cpu]
type = custom/script

exec = ~/.config/polybar/cuts/scripts/status_colored.sh cpu
interval = 1
format = <label>
format-background = ${color.background-alt}
format-padding = 1

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/date]
type = internal/date

interval = 1.0

time = " %I:%M %p  %a, %d %b %Y"
time-alt = " %a, %d %b %Y"

format = <label>
format-background = ${color.background-alt}
format-padding = 1

label = %time%
label-foreground = ${color.cyan}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/filesystem]
type = custom/script

exec = ~/.config/polybar/cuts/scripts/status_colored.sh fs
interval = 30
format = <label>
format-background = ${color.background-alt}
format-padding = 1

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/memory]
type = custom/script

exec = ~/.config/polybar/cuts/scripts/status_colored.sh mem
interval = 2
format = <label>
format-background = ${color.background-alt}
format-padding = 1

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/mpd]
type = internal/mpd

interval = 1

format-online = <label-song> <icon-prev> <toggle> <icon-next>
format-online-prefix = 
format-online-prefix-foreground = ${color.green}
format-online-background = ${color.background-alt}
format-online-padding = 1

format-offline = <label-offline>
format-offline-prefix = 
format-offline-prefix-foreground = ${color.red}
format-offline-background = ${color.background-alt}
format-offline-padding = 1

label-song =  " %artist% - %title%"
label-song-maxlen = 25
label-song-ellipsis = true

label-time = %elapsed% / %total%

label-offline = " Offline"

icon-play = 
icon-pause = 
icon-stop = 
icon-next = 
icon-prev = 

toggle-on-foreground = ${color.green}
toggle-off-foreground = ${color.red}

reconnect = true

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/wired-network]
type = internal/network
interface = enp46s0
interval = 1.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-background = ${color.background-alt}
format-connected-padding = 1

format-disconnected = <label-disconnected>
format-disconnected-background = ${color.background-alt}
format-disconnected-padding = 1

label-connected = " %ifname%  %downspeed% %upspeed%%{A}"
label-connected-foreground = ${color.green}
label-disconnected = "%ifname%: Offline%{A}"
label-disconnected-foreground = ${color.red}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/wireless-network]
type = internal/network
interface = wlan0
interval = 1.0
accumulate-stats = true
unknown-as-up = true

format-connected = <ramp-signal> <label-connected>
format-connected-background = ${color.background-alt}
format-connected-padding = 1

format-disconnected = <label-disconnected>
format-disconnected-prefix = 
format-disconnected-prefix-foreground = ${color.red}
format-disconnected-background = ${color.background-alt}
format-disconnected-padding = 1

label-connected = "%{A1:networkmanager_dmenu &:}%essid%  %downspeed% %upspeed%%{A}"
label-connected-foreground = ${color.green}
label-disconnected = "%{A1:networkmanager_dmenu &:}WiFi: Offline%{A}"
label-disconnected-foreground = ${color.red}

ramp-signal-0 = "睊 " 
ramp-signal-1 = " "
ramp-signal-2 = " "

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/wireless-network2]
type = internal/network
interface = wlan0
interval = 1.0
accumulate-stats = true
unknown-as-up = true

format-connected = <ramp-signal> <label-connected>
format-connected-background = ${color.background-alt}
format-connected-padding = 1

format-disconnected = <label-disconnected>
format-disconnected-prefix = 
format-disconnected-prefix-foreground = ${color.red}
format-disconnected-background = ${color.background-alt}
format-disconnected-padding = 1

label-connected = "%{A1:networkmanager_dmenu &:}%essid%  %downspeed% %upspeed%%{A}"
label-connected-foreground = ${color.green}
label-disconnected = "%{A1:networkmanager_dmenu &:}WiFi: Offline%{A}"
label-disconnected-foreground = ${color.red}

ramp-signal-0 = "睊 " 
ramp-signal-1 = " "
ramp-signal-2 = " "

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/network]
type = internal/network
interface = wlan0

interval = 1.0

accumulate-stats = true

unknown-as-up = true

format-connected = <label-connected>
format-connected-prefix = 
format-connected-prefix-foreground = ${color.cyan}
format-connected-background = ${color.background-alt}
format-connected-padding = 1

format-disconnected = <label-disconnected>
format-disconnected-prefix = 
format-disconnected-prefix-foreground = ${color.red}
format-disconnected-background = ${color.background-alt}
format-disconnected-padding = 1

label-connected = "%{A1:networkmanager_dmenu &:} %essid%  %downspeed%  %upspeed%%{A}"
label-connected-foreground = ${color.green}

label-disconnected = "%{A1:networkmanager_dmenu &:} Offline%{A}"
label-disconnected-foreground = ${color.red}

ramp-signal-0 = 
ramp-signal-1 = 
ramp-signal-2 = 

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/pulseaudio]
type = internal/pulseaudio

sink = alsa_output.pci-0000_03_00.6.analog-stereo

use-ui-max = false

interval = 5

; Active (unmuted) volume
format-volume = <ramp-volume> <label-volume>
format-volume-background = ${color.background-alt}
format-volume-foreground = ${color.foreground}
format-volume-padding = 1

; Neutral label color, ramp carries severity
label-volume = %percentage%%
label-volume-foreground = ${color.foreground}

; Muted state
format-muted = <label-muted>
format-muted-prefix = 
format-muted-prefix-foreground = ${color.foreground}
format-muted-background = ${color.background-alt}
format-muted-foreground = ${color.foreground}
format-muted-padding = 1

label-muted = " Muted"
label-muted-foreground = ${color.foreground}

; Icon ramp: low = green, mid = yellow, high = red
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-0-foreground = ${color.green}
ramp-volume-1-foreground = ${color.yellow}
ramp-volume-2-foreground = ${color.red}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/volumess]
type = custom/script

exec = ~/.config/polybar/cuts/scripts/status_colored.sh vol
interval = 2
format = <label>
format-background = ${color.background-alt}
format-padding = 1

; Left/middle click: mute/unmute
click-left = pactl set-sink-mute @DEFAULT_SINK@ toggle
click-middle = pactl set-sink-mute @DEFAULT_SINK@ toggle

; Right click: open mixer
click-right = pavucontrol &

; Scroll to change volume
scroll-up = ~/.config/polybar/cuts/scripts/volume_ctl.sh up 5
scroll-down = ~/.config/polybar/cuts/scripts/volume_ctl.sh down 5


[module/temperature]
type = custom/script

exec = ~/.config/polybar/cuts/scripts/status_colored.sh temp
interval = 2
format = <label>
format-background = ${color.background-alt}
format-padding = 1

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/keyboard]
type = internal/xkeyboard

blacklist-0 = num lock
blacklist-1 = scroll lock

format = <label-layout> <label-indicator>
format-background = ${color.background-alt}
format-padding = 1
format-prefix = 
format-prefix-foreground = ${color.blue}

label-layout = " %layout%"
label-layout-foreground = ${color.blue}

label-indicator-on = %name%
label-indicator-on-foreground = ${color.cyan}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/title]
type = internal/xwindow

format = <label>
format-background = ${color.background-alt}
format-padding = 0

label = "%title%"
label-maxlen = 30
label-foreground = ${color.foreground}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/workspaces]
type = internal/xworkspaces

pin-workspaces = true

enable-click = true

enable-scroll = true

icon-0 = 1; 
icon-1 = 2; 
icon-2 = 3; 
icon-3 = 4; 
icon-4 = 5; 
icon-5 = 6; 
icon-6 = 7; 
icon-7 = 8; 
icon-8 = 9; 
icon-9 = 0; 
icon-default = 

format = <label-state>
format-background = ${color.background-alt}
format-padding = 0

label-monitor = %name%

label-active = %icon%
label-active-foreground = ${color.red}
label-active-overline = ${color.red}

label-occupied = %icon%
label-occupied-foreground = ${color.yellow}

label-urgent = %icon%
label-urgent-foreground = ${color.green}

label-empty = %icon%
label-empty-foreground = ${color.foreground}

label-active-padding = 1
label-urgent-padding = 1
label-occupied-padding = 1
label-empty-padding = 1

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/azan]
type = custom/script
exec = ~/.config/bin/others/polybarazan/azan.sh
interval = 60
format = <label>
label = %output%
label-foreground = ${color.yellow}
label-background = ${color.background-alt}
format-prefix-foreground = ${color.cyan}
format-prefix-background = ${color.background-alt}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/spotify]
type = custom/script
exec = ~/.config/polybar/cuts/scripts/spotify/spotify_control.sh
interval = 2
label = %output%
click-left = ~/.config/polybar/cuts/scripts/spotify/spotify_control.sh --playpause
click-right = ~/.config/polybar/cuts/scripts/spotify/spotify_control.sh --next
click-middle = ~/.config/polybar/cuts/scripts/spotify/spotify_control.sh --previous
label-foreground = ${color.yellow}
label-background = ${color.background-alt}
format-prefix-foreground = ${color.cyan}
format-prefix-background = ${color.background-alt}

